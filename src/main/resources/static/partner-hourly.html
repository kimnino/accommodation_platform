<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대실 설정 - 파트너</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#f5f5f5}
        .header{background:#2196F3;color:white;padding:15px 20px}.header a{color:white;text-decoration:none;margin-right:15px}
        .container{max-width:900px;margin:20px auto;padding:0 20px}
        .section{background:white;border-radius:12px;padding:20px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
        .section h3{margin-bottom:15px;border-bottom:2px solid #9C27B0;padding-bottom:8px}
        .form-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;align-items:end}
        .form-row label{display:block;font-size:12px;color:#666;margin-bottom:3px}
        .form-row input,.form-row select{padding:8px;border:1px solid #ddd;border-radius:4px;font-size:14px}
        .btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;color:white}
        .btn-primary{background:#9C27B0}.btn-success{background:#4CAF50}
        .sel-row select{padding:10px;font-size:14px;border:2px solid #9C27B0;border-radius:6px}
        .result{margin-top:10px;font-size:13px;color:#4CAF50;font-weight:bold}
    </style>
</head>
<body>
    <div class="header"><a href="/partner.html">← 대시보드</a><strong>대실 설정</strong></div>
    <div class="container">
        <div class="sel-row" style="margin-bottom:15px;display:flex;gap:15px;align-items:end">
            <div><label style="font-weight:bold">숙소</label><select id="accSelect" onchange="loadOptions()"></select></div>
        </div>

        <div class="section">
            <h3>대실 운영 설정</h3>
            <p style="font-size:13px;color:#666;margin-bottom:15px">숙소별 대실 운영시간, 이용시간, 버퍼(청소)시간, 슬롯 단위를 설정합니다.</p>
            <div class="form-row">
                <div><label>운영 시작</label><select id="opStart"></select></div>
                <div><label>운영 종료</label><select id="opEnd"></select></div>
                <div><label>이용시간 (분)</label><input id="usageDuration" type="number" value="240" style="width:80px"></div>
                <div><label>버퍼시간 (분)</label><input id="bufferMin" type="number" value="30" style="width:80px"></div>
                <div><label>슬롯 단위</label><select id="slotUnit"><option value="30">30분</option><option value="60">60분</option></select></div>
                <div><button class="btn btn-primary" onclick="saveHourlySetting()">설정 저장</button></div>
            </div>
            <div id="settingResult" class="result"></div>
        </div>

        <div class="section">
            <h3>대실 슬롯 오픈</h3>
            <p style="font-size:13px;color:#666;margin-bottom:15px">객실 옵션별로 날짜 범위를 지정하여 대실 타임 슬롯을 자동 생성합니다.</p>
            <div class="form-row">
                <div><label>객실 옵션</label><select id="optSelect"></select></div>
                <div><label>시작일</label><input id="slotStart" type="date" value="2026-04-25"></div>
                <div><label>종료일</label><input id="slotEnd" type="date" value="2026-04-30"></div>
                <div><label>수량</label><input id="slotQty" type="number" value="1" style="width:60px"></div>
                <div><button class="btn btn-success" onclick="openSlots()">슬롯 오픈</button></div>
            </div>
            <div id="slotResult" class="result"></div>
        </div>
    </div>
    <script>
        const pid = new URLSearchParams(location.search).get('pid') || '1';

        function buildTimeOpts(selId, def) {
            const s = document.getElementById(selId);
            for (let h = 0; h < 24; h++) {
                const v = String(h).padStart(2,'0') + ':00';
                const o = document.createElement('option'); o.value = v; o.textContent = v;
                if (v === def) o.selected = true; s.appendChild(o);
            }
        }
        buildTimeOpts('opStart', '06:00');
        buildTimeOpts('opEnd', '22:00');

        async function loadAccSelect() {
            const res = await fetch('/api/v1/extranet/accommodations', { headers: { 'X-Partner-Id': pid } });
            const list = (await res.json()).data || [];
            document.getElementById('accSelect').innerHTML = list.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
            if (list.length > 0) loadOptions();
        }

        async function loadOptions() {
            const accId = document.getElementById('accSelect').value;
            const res = await fetch(`/api/v1/extranet/accommodations/${accId}/rooms`, { headers: { 'X-Partner-Id': pid } });
            const rooms = (await res.json()).data || [];
            let html = '';
            for (const r of rooms) {
                const optRes = await fetch(`/api/v1/extranet/accommodations/${accId}/rooms/${r.id}/options`, { headers: { 'X-Partner-Id': pid } });
                (await optRes.json()).data?.forEach(o => html += `<option value="${o.id}">${r.name} - ${o.name}</option>`);
            }
            document.getElementById('optSelect').innerHTML = html;
        }

        async function saveHourlySetting() {
            const accId = document.getElementById('accSelect').value;
            const res = await fetch(`/api/v1/extranet/accommodations/${accId}/hourly-setting`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Partner-Id': pid },
                body: JSON.stringify({
                    operating_start_time: document.getElementById('opStart').value,
                    operating_end_time: document.getElementById('opEnd').value,
                    usage_duration_minutes: +document.getElementById('usageDuration').value,
                    buffer_minutes: +document.getElementById('bufferMin').value,
                    slot_unit_minutes: +document.getElementById('slotUnit').value
                })
            });
            const json = await res.json();
            document.getElementById('settingResult').textContent = json.status === 'SUCCESS' ? '대실 설정 저장 완료' : '실패: ' + (json.error?.message||'');
        }

        async function openSlots() {
            const optId = document.getElementById('optSelect').value;
            const res = await fetch(`/api/v1/extranet/room-options/${optId}/time-slots`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Partner-Id': pid },
                body: JSON.stringify({
                    start_date: document.getElementById('slotStart').value,
                    end_date: document.getElementById('slotEnd').value,
                    total_quantity: +document.getElementById('slotQty').value
                })
            });
            const json = await res.json();
            document.getElementById('slotResult').textContent = json.status === 'SUCCESS'
                ? `슬롯 ${json.data.length}개 생성 완료` : '실패: ' + (json.error?.message||'');
        }

        loadAccSelect();
    </script>
</body>
</html>
