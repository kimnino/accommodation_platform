<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>숙소 관리 - 관리자</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#f5f5f5}
        .header{background:#FF5722;color:white;padding:15px 20px}.header a{color:white;text-decoration:none;margin-right:15px}
        .container{max-width:1000px;margin:20px auto;padding:0 20px}
        .section{background:white;border-radius:12px;padding:20px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
        .section h3{margin-bottom:15px;border-bottom:2px solid #FF5722;padding-bottom:8px}
        table{width:100%;border-collapse:collapse}th,td{padding:10px;text-align:left;border-bottom:1px solid #eee;font-size:13px}th{background:#f9f9f9}
        .btn{padding:5px 12px;border:none;border-radius:4px;cursor:pointer;font-size:11px;color:white;margin:1px}
        .btn-approve{background:#4CAF50}.btn-suspend{background:#FF9800}.btn-close{background:#9E9E9E}.btn-reject{background:#f44336}.btn-primary{background:#2196F3}
        .status{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:bold}
        .status.ACTIVE{background:#E8F5E9;color:#2E7D32}.status.PENDING{background:#FFF3E0;color:#E65100}
        .status.SUSPENDED{background:#FFEBEE;color:#C62828}.status.CLOSED{background:#ECEFF1;color:#546E7A}
    </style>
</head>
<body>
    <div class="header"><a href="/admin.html">← 대시보드</a><strong>숙소 관리</strong></div>
    <div class="container">
        <div class="section">
            <h3>전체 숙소 목록</h3>
            <table><thead><tr><th>ID</th><th>숙소명</th><th>유형</th><th>상태</th><th>관리</th></tr></thead>
            <tbody id="accList"></tbody></table>
        </div>
        <div class="section">
            <h3>수정 요청 대기 목록</h3>
            <table><thead><tr><th>요청ID</th><th>숙소ID</th><th>파트너ID</th><th>상태</th><th>요청일</th><th>처리</th></tr></thead>
            <tbody id="modList"></tbody></table>
        </div>
        <div id="accDetailSection" style="display:none">
            <div class="section">
                <h3 id="detailTitle">숙소 상세</h3>
                <div id="detailContent"></div>
            </div>
        </div>
    </div>
    <script>
        async function loadAll() {
            const res = await fetch('/api/v1/admin/accommodations');
            const list = (await res.json()).data || [];
            document.getElementById('accList').innerHTML = list.map(a => `
                <tr><td>${a.id}</td><td>${a.name}</td><td>${a.type}</td>
                <td><span class="status ${a.status}">${a.status}</span></td>
                <td>
                    <button class="btn btn-primary" onclick="showDetail(${a.id})">상세</button>
                    ${a.status==='PENDING'?`<button class="btn btn-approve" onclick="action(${a.id},'approve')">승인</button>`:''}
                    ${a.status==='ACTIVE'?`<button class="btn btn-suspend" onclick="action(${a.id},'suspend')">정지</button>`:''}
                    ${a.status!=='CLOSED'?`<button class="btn btn-close" onclick="action(${a.id},'close')">폐쇄</button>`:''}
                </td></tr>`).join('');

            // 수정 요청 목록 조회
            const modRes = await fetch('/api/v1/admin/accommodations/modifications/pending');
            const modList = (await modRes.json()).data || [];
            document.getElementById('modList').innerHTML = modList.length === 0
                ? '<tr><td colspan="6" style="text-align:center;color:#999">대기 중인 수정 요청 없음</td></tr>'
                : modList.map(m => `
                    <tr><td>${m.id}</td><td>${m.accommodation_id}</td><td>${m.partner_id}</td>
                    <td><span class="status PENDING">${m.status}</span></td>
                    <td><small>${m.created_at||'-'}</small></td>
                    <td>
                        <button class="btn btn-primary" onclick="showModDetail(${m.id}, ${m.accommodation_id}, '${encodeURIComponent(m.request_data||'')}')">상세</button>
                        <button class="btn btn-approve" onclick="approveMod(${m.id})">승인</button>
                        <button class="btn btn-reject" onclick="rejectMod(${m.id})">거절</button>
                    </td></tr>`).join('');
        }

        async function action(id, act) {
            if (act==='close' && !confirm('정말 폐쇄하시겠습니까?')) return;
            await fetch(`/api/v1/admin/accommodations/${id}/${act}`, { method: 'PATCH' });
            loadAll();
        }

        async function showDetail(id) {
            const res = await fetch(`/api/v1/admin/accommodations/${id}`);
            const d = (await res.json()).data;
            document.getElementById('detailTitle').textContent = `${d.name} 상세`;
            document.getElementById('detailContent').innerHTML = `
                <table>
                    <tr><th style="width:120px">ID</th><td>${d.id}</td></tr>
                    <tr><th>숙소명</th><td>${d.name}</td></tr>
                    <tr><th>유형</th><td>${d.type}</td></tr>
                    <tr><th>상태</th><td><span class="status ${d.status}">${d.status}</span></td></tr>
                    <tr><th>주소</th><td>${d.full_address}</td></tr>
                    <tr><th>좌표</th><td>${d.latitude}, ${d.longitude}</td></tr>
                    <tr><th>위치설명</th><td>${d.location_description||'-'}</td></tr>
                    <tr><th>체크인/아웃</th><td>${d.check_in_time||'-'} / ${d.check_out_time||'-'}</td></tr>
                    <tr><th>이미지</th><td>${(d.images||[]).map(i=>`<small>${i.relative_path} (${i.category})</small>`).join('<br>')||'-'}</td></tr>
                </table>`;
            document.getElementById('accDetailSection').style.display = 'block';
        }

        async function showModDetail(modId, accId, requestDataEncoded) {
            const accRes = await fetch(`/api/v1/admin/accommodations/${accId}`);
            const acc = (await accRes.json()).data;
            let reqData = {};
            try { reqData = JSON.parse(decodeURIComponent(requestDataEncoded)); } catch(e) {}

            document.getElementById('detailTitle').textContent = `수정 요청 #${modId} 상세 (숙소: ${acc.name})`;
            document.getElementById('detailContent').innerHTML = `
                <table>
                    <tr><th style="width:120px">항목</th><th>현재 값</th><th style="color:#FF5722">변경 요청</th></tr>
                    <tr><td>숙소명</td><td>${acc.name}</td><td style="color:#FF5722;font-weight:bold">${reqData.name||'-'}</td></tr>
                    <tr><td>주소</td><td>${acc.full_address}</td><td>${reqData.full_address||'-'}</td></tr>
                    <tr><td>체크인</td><td>${acc.check_in_time||'-'}</td><td>${reqData.check_in_time||'-'}</td></tr>
                    <tr><td>체크아웃</td><td>${acc.check_out_time||'-'}</td><td>${reqData.check_out_time||'-'}</td></tr>
                    <tr><td>위치설명</td><td>${acc.location_description||'-'}</td><td>${reqData.location_description||'-'}</td></tr>
                </table>
                <p style="margin-top:10px;font-size:12px;color:#999">* 다국어 데이터 확인은 별도 Translation API 필요 (Phase 7)</p>`;
            document.getElementById('accDetailSection').style.display = 'block';
        }

        async function approveMod(id) {
            if (!confirm('수정 요청을 승인하시겠습니까?')) return;
            const res = await fetch(`/api/v1/admin/accommodations/modifications/${id}/approve`, { method: 'PATCH' });
            const json = await res.json();
            alert(json.status === 'SUCCESS' ? '수정 요청 승인 완료 → 숙소 정보 반영됨' : '실패: ' + (json.error?.message||''));
            loadAll();
        }

        async function rejectMod(id) {
            const reason = prompt('거절 사유를 입력하세요:');
            if (!reason) return;
            const res = await fetch(`/api/v1/admin/accommodations/modifications/${id}/reject`, {
                method: 'PATCH', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ reason })
            });
            const json = await res.json();
            alert(json.status === 'SUCCESS' ? '수정 요청 거절 완료' : '실패: ' + (json.error?.message||''));
            loadAll();
        }

        loadAll();
    </script>
</body>
</html>
