<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>태그 관리 - 파트너</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#f5f5f5}
        .header{background:#2196F3;color:white;padding:15px 20px}.header a{color:white;text-decoration:none;margin-right:15px}
        .container{max-width:900px;margin:20px auto;padding:0 20px}
        .section{background:white;border-radius:12px;padding:20px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
        .section h3{margin-bottom:15px;border-bottom:2px solid #FF9800;padding-bottom:8px}
        .sel-row{display:flex;gap:15px;margin-bottom:15px;align-items:end}
        .sel-row select{padding:10px;font-size:14px;border:2px solid #FF9800;border-radius:6px}
        .tag-group{margin-bottom:12px;padding:12px;border:1px solid #e0e0e0;border-radius:8px}
        .tag-group h4{margin-bottom:8px;color:#FF9800}
        .tag-chip{display:inline-block;padding:4px 10px;margin:3px;border-radius:16px;font-size:13px;background:#FFF3E0;color:#E65100;border:1px solid #FFE0B2}
        .tag-chip.selected{background:#FF9800;color:white;border-color:#FF9800}
        .tag-chip .remove{cursor:pointer;margin-left:5px;font-weight:bold}
        .btn{padding:6px 14px;border:none;border-radius:4px;cursor:pointer;font-size:12px;color:white;margin:2px}
        .btn-add{background:#4CAF50}.btn-remove{background:#f44336}
        .my-tags{margin-top:10px;padding:10px;background:#E8F5E9;border-radius:8px}
        .my-tags h4{margin-bottom:8px;color:#2E7D32;font-size:13px}
    </style>
</head>
<body>
    <div class="header"><a href="/partner.html">← 대시보드</a><strong>태그 관리</strong></div>
    <div class="container">
        <div class="sel-row">
            <div><label style="font-weight:bold">숙소</label><select id="accSelect" onchange="loadAll()"></select></div>
            <div><label style="font-weight:bold">태그 대상</label><select id="targetType" onchange="loadAll()"><option value="ACCOMMODATION">숙소 태그</option><option value="ROOM">객실 태그</option></select></div>
        </div>

        <div class="section">
            <h3>내 숙소에 연결된 태그</h3>
            <div id="myTags" class="my-tags"><p style="color:#999">로딩 중...</p></div>
        </div>

        <div class="section">
            <h3>사용 가능한 태그 그룹</h3>
            <div id="availableGroups"></div>
        </div>
    </div>
    <script>
        const pid = new URLSearchParams(location.search).get('pid') || '1';

        async function loadAccSelect() {
            const res = await fetch('/api/v1/extranet/accommodations', { headers: { 'X-Partner-Id': pid } });
            const list = (await res.json()).data || [];
            document.getElementById('accSelect').innerHTML = list.map(a => `<option value="${a.id}">${a.name} (${a.type})</option>`).join('');
            if (list.length > 0) loadAll();
        }

        async function loadAll() {
            await Promise.all([loadMyTags(), loadAvailableGroups()]);
        }

        async function loadMyTags() {
            const accId = document.getElementById('accSelect').value;
            const res = await fetch(`/api/v1/extranet/accommodations/${accId}/tags`, { headers: { 'X-Partner-Id': pid } });
            const tagIds = (await res.json()).data || [];

            if (tagIds.length === 0) {
                document.getElementById('myTags').innerHTML = '<p style="color:#999">연결된 태그 없음</p>';
                return;
            }

            document.getElementById('myTags').innerHTML = '<h4>현재 연결된 태그 ID</h4>' +
                tagIds.map(id => `<span class="tag-chip selected">#${id} <span class="remove" onclick="removeTag(${id})">×</span></span>`).join('');
        }

        async function loadAvailableGroups() {
            const accId = document.getElementById('accSelect').value;
            const targetType = document.getElementById('targetType').value;
            const res = await fetch(`/api/v1/extranet/accommodations/${accId}/tags/groups?targetType=${targetType}`, { headers: { 'X-Partner-Id': pid } });
            const groups = (await res.json()).data || [];

            let html = '';
            for (const g of groups) {
                const tagRes = await fetch(`/api/v1/extranet/accommodations/${accId}/tags/groups/${g.id}`, { headers: { 'X-Partner-Id': pid } });
                const tags = (await tagRes.json()).data || [];
                html += `<div class="tag-group">
                    <h4>${g.name} ${g.accommodation_type ? '(' + g.accommodation_type + ')' : '(전체)'}</h4>
                    ${tags.length === 0 ? '<p style="color:#999;font-size:13px">태그 없음</p>' :
                    tags.map(t => `<span class="tag-chip">${t.name}
                        <button class="btn btn-add" style="padding:2px 6px;font-size:10px;margin-left:3px" onclick="addTag(${t.id})">+</button>
                    </span>`).join('')}
                </div>`;
            }

            document.getElementById('availableGroups').innerHTML = html || '<p style="color:#999">사용 가능한 태그 그룹이 없습니다.</p>';
        }

        async function addTag(tagId) {
            const accId = document.getElementById('accSelect').value;
            await fetch(`/api/v1/extranet/accommodations/${accId}/tags`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Partner-Id': pid },
                body: JSON.stringify({ tag_ids: [tagId] })
            });
            loadMyTags();
        }

        async function removeTag(tagId) {
            const accId = document.getElementById('accSelect').value;
            await fetch(`/api/v1/extranet/accommodations/${accId}/tags`, {
                method: 'DELETE', headers: { 'Content-Type': 'application/json', 'X-Partner-Id': pid },
                body: JSON.stringify({ tag_ids: [tagId] })
            });
            loadMyTags();
        }

        loadAccSelect();
    </script>
</body>
</html>
