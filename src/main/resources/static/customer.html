<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>숙소 검색 - 고객</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; }
        .header { background: #4CAF50; color: white; padding: 15px 20px; }
        .header a { color: white; text-decoration: none; margin-right: 15px; }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .search-box { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px;
                      box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; gap: 10px; flex-wrap: wrap; align-items: end; }
        .search-box label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
        .search-box input, .search-box select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .search-box button { padding: 8px 20px; background: #4CAF50; color: white; border: none;
                             border-radius: 6px; cursor: pointer; font-size: 14px; }
        .results { display: grid; gap: 15px; }
        .acc-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
                    cursor: pointer; display: flex; gap: 15px; }
        .acc-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
        .acc-info { flex: 1; }
        .acc-info h3 { margin-bottom: 5px; }
        .acc-info .type { color: #4CAF50; font-size: 13px; font-weight: bold; }
        .acc-info .address { color: #666; font-size: 13px; margin: 5px 0; }
        .acc-info .price { font-size: 20px; font-weight: bold; color: #FF5722; }
        .acc-info .price small { font-size: 12px; color: #999; font-weight: normal; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
        .badge.available { background: #E8F5E9; color: #2E7D32; }
        .badge.soldout { background: #FFEBEE; color: #C62828; }
        /* 상세 모달 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                 background: rgba(0,0,0,0.5); z-index: 100; }
        .modal-content { background: white; max-width: 700px; margin: 40px auto; border-radius: 12px;
                         padding: 30px; max-height: 80vh; overflow-y: auto; }
        .modal-content h2 { margin-bottom: 15px; }
        .room-card { border: 1px solid #eee; border-radius: 8px; padding: 15px; margin-bottom: 10px; }
        .room-card h4 { margin-bottom: 8px; }
        .option-row { display: flex; justify-content: space-between; align-items: center;
                      padding: 8px 0; border-top: 1px solid #f5f5f5; }
        .option-row .opt-name { font-size: 14px; }
        .option-row .opt-price { font-weight: bold; color: #FF5722; }
        .btn-reserve { padding: 6px 16px; background: #4CAF50; color: white; border: none;
                       border-radius: 6px; cursor: pointer; font-size: 13px; }
        .close-btn { float: right; cursor: pointer; font-size: 24px; color: #999; }
        /* 예약 폼 */
        .reserve-form { margin-top: 15px; padding: 15px; background: #f9f9f9; border-radius: 8px; }
        .reserve-form input { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; }
        .reserve-form button { margin-top: 10px; width: 100%; padding: 10px; background: #FF5722; color: white;
                               border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
        .my-reservations { margin-top: 20px; }
        .res-card { background: white; border-radius: 8px; padding: 15px; margin-bottom: 10px;
                    box-shadow: 0 1px 4px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .res-status { padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .res-status.PAYMENT_WAITING { background: #FFF3E0; color: #E65100; }
        .res-status.CONFIRMED { background: #E8F5E9; color: #2E7D32; }
        .res-status.CANCELLED { background: #FFEBEE; color: #C62828; }
        .btn-cancel { padding: 4px 12px; background: #f44336; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/">← 홈</a>
        <strong>고객 - 숙소 검색 & 예약</strong>
        <span style="float:right">회원 ID: <input id="memberId" value="1" style="width:40px;text-align:center">
        <button onclick="loadMyReservations()" style="padding:4px 8px;cursor:pointer">내 예약</button></span>
    </div>
    <div class="container">
        <div class="search-box">
            <div><label>지역</label><input id="region" placeholder="강남, 해운대..."></div>
            <div><label>체크인</label><input id="checkIn" type="date" value="2026-04-25"></div>
            <div><label>체크아웃</label><input id="checkOut" type="date" value="2026-04-27"></div>
            <div><label>인원</label><input id="guests" type="number" value="2" min="1" style="width:60px"></div>
            <div><label>숙소유형</label>
                <select id="accType"><option value="">전체</option><option>HOTEL</option><option>RESORT</option>
                <option>PENSION</option><option>MOTEL</option><option>GUEST_HOUSE</option></select></div>
            <div><label>최저가</label><input id="minPrice" type="number" placeholder="0" style="width:80px"></div>
            <div><label>최고가</label><input id="maxPrice" type="number" placeholder="∞" style="width:80px"></div>
            <div><button onclick="search()">검색</button></div>
        </div>
        <div id="results" class="results"></div>
        <div id="myReservations" class="my-reservations" style="display:none">
            <h3>내 예약 목록</h3>
            <div id="resList"></div>
        </div>
    </div>

    <div id="modal" class="modal" onclick="if(event.target===this)closeModal()">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        const API = '';

        async function search() {
            const params = new URLSearchParams();
            const region = document.getElementById('region').value;
            const checkIn = document.getElementById('checkIn').value;
            const checkOut = document.getElementById('checkOut').value;
            const guests = document.getElementById('guests').value;
            const accType = document.getElementById('accType').value;
            if (region) params.set('region', region);
            if (checkIn) params.set('checkInDate', checkIn);
            if (checkOut) params.set('checkOutDate', checkOut);
            if (guests) params.set('guestCount', guests);
            if (accType) params.set('accommodationType', accType);
            const minP = document.getElementById('minPrice').value;
            const maxP = document.getElementById('maxPrice').value;
            if (minP) params.set('minPrice', minP);
            if (maxP) params.set('maxPrice', maxP);

            const res = await fetch(`${API}/api/v1/accommodations?${params}`);
            const json = await res.json();
            const list = json.data?.content || [];
            document.getElementById('myReservations').style.display = 'none';

            document.getElementById('results').innerHTML = list.length === 0
                ? '<p style="text-align:center;color:#999;padding:40px">검색 결과가 없습니다.</p>'
                : list.map(a => `
                    <div class="acc-card" onclick="showDetail(${a.id})">
                        <div class="acc-info">
                            <span class="type">${a.type}</span>
                            <h3>${a.name}</h3>
                            <div class="address">${a.full_address}</div>
                            <div class="price">${a.lowest_price ? Number(a.lowest_price).toLocaleString() + '원~' : '가격 미설정'}
                                <small>/1박</small></div>
                            <span class="badge ${a.has_available_room ? 'available' : 'soldout'}">
                                ${a.has_available_room ? '예약가능' : '매진'}</span>
                        </div>
                    </div>`).join('');
        }

        async function showDetail(id) {
            const checkIn = document.getElementById('checkIn').value;
            const checkOut = document.getElementById('checkOut').value;
            const res = await fetch(`${API}/api/v1/accommodations/${id}?checkInDate=${checkIn}&checkOutDate=${checkOut}`);
            const json = await res.json();
            const d = json.data;

            document.getElementById('modalContent').innerHTML = `
                <span class="close-btn" onclick="closeModal()">&times;</span>
                <h2>${d.name}</h2>
                <p style="color:#666;margin-bottom:15px">${d.full_address}</p>
                ${d.rooms.map(r => `
                    <div class="room-card">
                        <h4>${r.room_name} ${r.room_type_name ? '(' + r.room_type_name + ')' : ''}</h4>
                        <small>기준 ${r.standard_capacity}명 / 최대 ${r.max_capacity}명</small>
                        ${r.options.map(o => `
                            <div class="option-row">
                                <span class="opt-name">${o.option_name}
                                    ${o.additional_price > 0 ? '<small>(+' + Number(o.additional_price).toLocaleString() + ')</small>' : ''}</span>
                                <span>
                                    <span class="opt-price">${Number(o.total_price).toLocaleString()}원</span>
                                    <small>(잔여 ${o.remaining_quantity})</small>
                                    ${o.remaining_quantity > 0
                                        ? `<button class="btn-reserve" onclick="showReserveForm(${d.id},${o.option_id},'${o.option_name}',${o.total_price},'STAY')">숙박</button>
                                           <button class="btn-reserve" style="background:#9C27B0" onclick="showReserveForm(${d.id},${o.option_id},'${o.option_name}',${o.total_price},'HOURLY')">대실</button>`
                                        : '<span class="badge soldout">매진</span>'}
                                </span>
                            </div>`).join('')}
                    </div>`).join('')}
                <div id="reserveForm"></div>`;
            document.getElementById('modal').style.display = 'block';
        }

        function showReserveForm(accId, optionId, optionName, totalPrice, type) {
            const isHourly = type === 'HOURLY';
            document.getElementById('reserveForm').innerHTML = `
                <div class="reserve-form">
                    <h4>${optionName} ${isHourly ? '대실' : '숙박'} 예약 ${isHourly ? '' : '(' + Number(totalPrice).toLocaleString() + '원)'}</h4>
                    ${isHourly ? '<input id="hourlyDate" type="date" value="' + document.getElementById('checkIn').value + '" placeholder="이용 날짜"><input id="hourlyTime" type="time" value="14:00" placeholder="시작 시간">' : ''}
                    <input id="guestName" placeholder="투숙객 이름">
                    <input id="guestPhone" placeholder="연락처 (010-xxxx-xxxx)">
                    <input id="guestEmail" placeholder="이메일 (선택)">
                    <button onclick="reserve(${accId},${optionId},'${type}')">${isHourly ? '대실' : '숙박'} 예약하기</button>
                </div>`;
        }

        async function reserve(accId, optionId, type) {
            const memberId = document.getElementById('memberId').value;
            const isHourly = type === 'HOURLY';
            const endpoint = isHourly ? `${API}/api/v1/reservations/hourly` : `${API}/api/v1/reservations/stay`;
            const body = isHourly ? {
                reservation_request_id: crypto.randomUUID(),
                accommodation_id: accId,
                room_option_id: optionId,
                date: document.getElementById('hourlyDate').value,
                start_time: document.getElementById('hourlyTime').value,
                guest_name: document.getElementById('guestName').value,
                guest_phone: document.getElementById('guestPhone').value,
                guest_email: document.getElementById('guestEmail').value || null
            } : {
                reservation_request_id: crypto.randomUUID(),
                accommodation_id: accId,
                room_option_id: optionId,
                check_in_date: document.getElementById('checkIn').value,
                check_out_date: document.getElementById('checkOut').value,
                guest_name: document.getElementById('guestName').value,
                guest_phone: document.getElementById('guestPhone').value,
                guest_email: document.getElementById('guestEmail').value || null
            };
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Member-Id': memberId },
                body: JSON.stringify(body)
            });
            const json = await res.json();
            if (json.status === 'SUCCESS') {
                alert(`예약 완료! 예약번호: ${json.data.reservation_number}\n상태: ${json.data.status}\n10분 내 결제가 필요합니다.`);
                closeModal();
                search();
            } else {
                alert(`예약 실패: ${json.error?.message || '알 수 없는 오류'}`);
            }
        }

        async function loadMyReservations() {
            const memberId = document.getElementById('memberId').value;
            const res = await fetch(`${API}/api/v1/reservations`, {
                headers: { 'X-Member-Id': memberId }
            });
            const json = await res.json();
            const list = json.data || [];

            document.getElementById('results').innerHTML = '';
            document.getElementById('myReservations').style.display = 'block';
            document.getElementById('resList').innerHTML = list.length === 0
                ? '<p style="color:#999;padding:20px">예약 내역이 없습니다.</p>'
                : list.map(r => `
                    <div class="res-card">
                        <div>
                            <strong>${r.reservation_number}</strong><br>
                            <small>${r.reservation_type} | ${r.check_in_date} ~ ${r.check_out_date} | ${Number(r.total_price).toLocaleString()}원</small>
                        </div>
                        <div>
                            <span class="res-status ${r.status}">${r.status}</span>
                            ${r.status !== 'CANCELLED' && r.status !== 'COMPLETED'
                                ? `<button class="btn-cancel" onclick="cancelRes(${r.id})">취소</button>` : ''}
                        </div>
                    </div>`).join('');
        }

        async function cancelRes(id) {
            if (!confirm('예약을 취소하시겠습니까?')) return;
            const memberId = document.getElementById('memberId').value;
            await fetch(`${API}/api/v1/reservations/${id}`, {
                method: 'DELETE',
                headers: { 'X-Member-Id': memberId }
            });
            loadMyReservations();
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        search();
    </script>
</body>
</html>
