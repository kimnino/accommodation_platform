<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재고 & 가격 설정 - 파트너</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; }
        .header { background: #2196F3; color: white; padding: 15px 20px; }
        .header a { color: white; text-decoration: none; margin-right: 15px; }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .section { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .section h3 { margin-bottom: 15px; border-bottom: 2px solid #4CAF50; padding-bottom: 8px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; align-items: end; }
        .form-row label { display: block; font-size: 12px; color: #666; margin-bottom: 3px; }
        .form-row input, .form-row select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; color: white; }
        .btn-success { background: #4CAF50; } .btn-warn { background: #FF9800; } .btn-primary { background: #2196F3; }
        table { width: 100%; border-collapse: collapse; } th, td { padding: 8px; text-align: left; border-bottom: 1px solid #eee; font-size: 13px; } th { background: #f9f9f9; }
        .result-msg { margin-top: 8px; font-size: 13px; color: #4CAF50; font-weight: bold; }
        .sel-row { display: flex; gap: 15px; margin-bottom: 15px; align-items: end; }
        .sel-row select { padding: 10px; font-size: 14px; border: 2px solid #4CAF50; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/partner.html">← 대시보드</a>
        <strong>재고 & 가격 설정</strong>
    </div>
    <div class="container">
        <div class="sel-row">
            <div><label style="font-weight:bold">숙소</label><select id="accSelect" onchange="loadOptions()"></select></div>
            <div><label style="font-weight:bold">객실 옵션</label><select id="optSelect" onchange="loadSetup()"></select></div>
            <div><label style="font-weight:bold">가격 유형</label><select id="priceType"><option value="STAY">숙박</option><option value="HOURLY">대실</option></select></div>
        </div>

        <div class="section">
            <h3>일괄 설정</h3>
            <div class="form-row">
                <div><label>시작일</label><input id="sStart" type="date" value="2026-04-25"></div>
                <div><label>종료일</label><input id="sEnd" type="date" value="2026-05-31"></div>
                <div><label>재고</label><input id="sQty" type="number" value="3" style="width:60px"></div>
                <div><label>정가</label><input id="sBase" type="number" style="width:100px"></div>
                <div><label>판매가</label><input id="sSell" type="number" style="width:100px"></div>
                <div><button class="btn btn-success" onclick="setBulk()">일괄 설정</button></div>
            </div>
            <div id="bulkResult" class="result-msg"></div>
        </div>

        <div class="section">
            <h3>특정 날짜 개별 설정</h3>
            <div class="form-row">
                <div><label>날짜 (콤마 구분)</label><input id="sDates" placeholder="2026-05-01,2026-05-03" style="width:280px"></div>
                <div><label>재고</label><input id="sQty2" type="number" value="0" style="width:60px"></div>
                <div><label>판매가 (선택)</label><input id="sSell2" type="number" style="width:100px"></div>
                <div><button class="btn btn-warn" onclick="setDates()">개별 설정</button></div>
            </div>
            <div id="dateResult" class="result-msg"></div>
        </div>

        <div class="section">
            <h3>현재 설정 현황 <button class="btn btn-primary" style="padding:4px 10px;font-size:11px;margin-left:10px" onclick="loadSetup()">새로고침</button></h3>
            <div style="max-height:400px;overflow-y:auto">
            <table><thead><tr><th>날짜</th><th>요일</th><th>재고 (잔여/총)</th><th>상태</th><th>숙박 가격</th><th>대실 가격</th></tr></thead>
            <tbody id="setupList"></tbody></table>
            </div>
        </div>
    </div>
    <script>
        const pid = new URLSearchParams(location.search).get('pid') || '1';
        const dayNames = ['일','월','화','수','목','금','토'];

        async function loadAccSelect() {
            const res = await fetch(`/api/v1/extranet/accommodations`, { headers: { 'X-Partner-Id': pid } });
            const list = (await res.json()).data || [];
            document.getElementById('accSelect').innerHTML = list.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
            if (list.length > 0) loadOptions();
        }

        async function loadOptions() {
            const accId = document.getElementById('accSelect').value;
            const res = await fetch(`/api/v1/extranet/accommodations/${accId}/rooms`, { headers: { 'X-Partner-Id': pid } });
            const rooms = (await res.json()).data || [];
            let html = '';
            for (const r of rooms) {
                const optRes = await fetch(`/api/v1/extranet/accommodations/${accId}/rooms/${r.id}/options`, { headers: { 'X-Partner-Id': pid } });
                (await optRes.json()).data?.forEach(o => html += `<option value="${o.id}">${r.name} - ${o.name}</option>`);
            }
            document.getElementById('optSelect').innerHTML = html;
            loadSetup();
        }

        async function setBulk() {
            const optId = document.getElementById('optSelect').value;
            const start = document.getElementById('sStart').value, end = document.getElementById('sEnd').value;
            let msgs = [];
            // 재고
            const invRes = await fetch(`/api/v1/extranet/room-options/${optId}/inventories`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Partner-Id': pid },
                body: JSON.stringify({ start_date: start, end_date: end, total_quantity: +document.getElementById('sQty').value })
            });
            msgs.push((await invRes.json()).status === 'SUCCESS' ? 'V 재고' : 'X 재고');
            // 가격
            const base = +document.getElementById('sBase').value, sell = +document.getElementById('sSell').value;
            if (base > 0 && sell > 0) {
                const prRes = await fetch(`/api/v1/extranet/room-options/${optId}/prices`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Partner-Id': pid },
                    body: JSON.stringify({ start_date: start, end_date: end, price_type: document.getElementById('priceType').value,
                        base_price: base, selling_price: sell, tax_included: true })
                });
                msgs.push((await prRes.json()).status === 'SUCCESS' ? 'V 가격' : 'X 가격');
            }
            document.getElementById('bulkResult').textContent = msgs.join(' / ');
            loadSetup();
        }

        async function setDates() {
            const optId = document.getElementById('optSelect').value;
            const dates = document.getElementById('sDates').value.split(',').map(d => d.trim()).filter(d => d);
            if (!dates.length) { alert('날짜를 입력하세요'); return; }
            let msgs = [];
            // 재고
            const invRes = await fetch(`/api/v1/extranet/room-options/${optId}/inventories`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Partner-Id': pid },
                body: JSON.stringify({ dates, total_quantity: +document.getElementById('sQty2').value })
            });
            msgs.push((await invRes.json()).status === 'SUCCESS' ? 'V 재고' : 'X 재고');
            // 가격
            const sell = +document.getElementById('sSell2').value;
            if (sell > 0) {
                const prRes = await fetch(`/api/v1/extranet/room-options/${optId}/prices`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Partner-Id': pid },
                    body: JSON.stringify({ dates, price_type: document.getElementById('priceType').value,
                        base_price: sell, selling_price: sell, tax_included: true })
                });
                msgs.push((await prRes.json()).status === 'SUCCESS' ? 'V 가격' : 'X 가격');
            }
            document.getElementById('dateResult').textContent = msgs.join(' / ');
            loadSetup();
        }

        async function loadSetup() {
            const optId = document.getElementById('optSelect').value;
            if (!optId) { document.getElementById('setupList').innerHTML = ''; return; }
            const start = document.getElementById('sStart').value, end = document.getElementById('sEnd').value;
            const [invRes, prRes] = await Promise.all([
                fetch(`/api/v1/extranet/room-options/${optId}/inventories?startDate=${start}&endDate=${end}`, { headers: { 'X-Partner-Id': pid } }),
                fetch(`/api/v1/extranet/room-options/${optId}/prices?startDate=${start}&endDate=${end}`, { headers: { 'X-Partner-Id': pid } })
            ]);
            const invData = (await invRes.json()).data || [];
            const prData = (await prRes.json()).data || [];
            const invMap = {}, stayMap = {}, hourlyMap = {};
            invData.forEach(i => invMap[i.date] = i);
            prData.forEach(p => { if (p.price_type==='STAY') stayMap[p.date]=p; else hourlyMap[p.date]=p; });
            const allDates = [...new Set([...Object.keys(invMap),...Object.keys(stayMap),...Object.keys(hourlyMap)])].sort();

            document.getElementById('setupList').innerHTML = allDates.length === 0
                ? '<tr><td colspan="6" style="text-align:center;color:#999;padding:20px">데이터 없음</td></tr>'
                : allDates.map(d => {
                    const inv = invMap[d], stay = stayMap[d], hourly = hourlyMap[d];
                    const dt = new Date(d); const day = dayNames[dt.getDay()];
                    const isWeekend = dt.getDay()===0||dt.getDay()===6;
                    const sc = inv?.status==='AVAILABLE'?'#2E7D32':inv?.status==='SOLD_OUT'?'#C62828':'#546E7A';
                    return `<tr style="${isWeekend?'background:#FFF8E1':''}">
                        <td>${d}</td><td style="${isWeekend?'color:#FF5722;font-weight:bold':''}">${day}</td>
                        <td>${inv?`${inv.remaining_quantity}/${inv.total_quantity}`:'-'}</td>
                        <td style="color:${sc};font-weight:bold">${inv?.status||'-'}</td>
                        <td>${stay?Number(stay.selling_price).toLocaleString()+'원':'-'}</td>
                        <td>${hourly?Number(hourly.selling_price).toLocaleString()+'원':'-'}</td></tr>`;
                }).join('');
        }

        loadAccSelect();
    </script>
</body>
</html>
