<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>태그 관리 - 관리자</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#f5f5f5}
        .header{background:#FF5722;color:white;padding:15px 20px}.header a{color:white;text-decoration:none;margin-right:15px}
        .container{max-width:1000px;margin:20px auto;padding:0 20px}
        .section{background:white;border-radius:12px;padding:20px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
        .section h3{margin-bottom:15px;border-bottom:2px solid #FF5722;padding-bottom:8px}
        table{width:100%;border-collapse:collapse}th,td{padding:8px;text-align:left;border-bottom:1px solid #eee;font-size:13px}th{background:#f9f9f9}
        .form-row{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap;align-items:end}
        .form-row label{display:block;font-size:12px;color:#666;margin-bottom:3px}
        .form-row input,.form-row select{padding:6px 10px;border:1px solid #ddd;border-radius:4px;font-size:13px}
        .btn{padding:5px 12px;border:none;border-radius:4px;cursor:pointer;font-size:11px;color:white;margin:1px}
        .btn-create{background:#4CAF50}.btn-edit{background:#2196F3}.btn-deact{background:#FF9800}.btn-del{background:#f44336}
        .active{color:#2E7D32}.inactive{color:#C62828}
    </style>
</head>
<body>
    <div class="header"><a href="/admin.html">← 대시보드</a><strong>태그 관리</strong></div>
    <div class="container">
        <div class="section">
            <h3>태그 그룹</h3>
            <table><thead><tr><th>ID</th><th>그룹명</th><th>대상</th><th>숙소유형</th><th>순서</th><th>상태</th><th>관리</th></tr></thead>
            <tbody id="groupList"></tbody></table>
            <div style="margin-top:12px;padding-top:10px;border-top:1px solid #eee">
                <strong style="font-size:13px">태그 그룹 추가</strong>
                <div class="form-row" style="margin-top:5px">
                    <div><label>그룹명</label><input id="newGroupName"></div>
                    <div><label>대상</label><select id="newGroupTarget"><option value="ACCOMMODATION">숙소</option><option value="ROOM">객실</option></select></div>
                    <div><label>숙소유형</label><select id="newGroupAccType"><option value="">전체</option><option>HOTEL</option><option>RESORT</option><option>MOTEL</option><option>PENSION</option><option>GUEST_HOUSE</option></select></div>
                    <div><label>순서</label><input id="newGroupOrder" type="number" value="0" style="width:50px"></div>
                    <div><button class="btn btn-create" onclick="createGroup()">추가</button></div>
                </div>
            </div>
        </div>

        <div class="section">
            <h3>태그 목록</h3>
            <div class="form-row" style="margin-bottom:12px">
                <div><label>태그 그룹 선택</label><select id="groupSelect" onchange="loadTags()"></select></div>
            </div>
            <table><thead><tr><th>ID</th><th>태그명</th><th>순서</th><th>상태</th><th>관리</th></tr></thead>
            <tbody id="tagList"></tbody></table>
            <div style="margin-top:12px;padding-top:10px;border-top:1px solid #eee">
                <strong style="font-size:13px">태그 추가</strong>
                <div class="form-row" style="margin-top:5px">
                    <div><label>태그명</label><input id="newTagName"></div>
                    <div><label>순서</label><input id="newTagOrder" type="number" value="0" style="width:50px"></div>
                    <div><button class="btn btn-create" onclick="createTag()">추가</button></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        async function loadGroups() {
            const res = await fetch('/api/v1/admin/tag-groups');
            const list = (await res.json()).data || [];
            document.getElementById('groupList').innerHTML = list.map(g => `
                <tr><td>${g.id}</td><td id="gname_${g.id}">${g.name}</td><td>${g.target_type}</td>
                <td>${g.accommodation_type||'전체'}</td><td>${g.display_order}</td>
                <td class="${g.is_active?'active':'inactive'}">${g.is_active?'활성':'비활성'}</td>
                <td>
                    <button class="btn btn-edit" onclick="editGroup(${g.id})">수정</button>
                    ${g.is_active?`<button class="btn btn-deact" onclick="deactGroup(${g.id})">비활성화</button>`:''}
                </td></tr>`).join('');
            document.getElementById('groupSelect').innerHTML = list.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
            if (list.length > 0) loadTags();
        }

        async function loadTags() {
            const gid = document.getElementById('groupSelect').value;
            if (!gid) return;
            const res = await fetch(`/api/v1/admin/tag-groups/${gid}/tags`);
            const list = (await res.json()).data || [];
            document.getElementById('tagList').innerHTML = list.length === 0
                ? '<tr><td colspan="5" style="text-align:center;color:#999">태그 없음</td></tr>'
                : list.map(t => `
                <tr><td>${t.id}</td><td id="tname_${t.id}">${t.name}</td><td>${t.display_order}</td>
                <td class="${t.is_active?'active':'inactive'}">${t.is_active?'활성':'비활성'}</td>
                <td>
                    <button class="btn btn-edit" onclick="editTag(${t.id})">수정</button>
                    ${t.is_active?`<button class="btn btn-deact" onclick="deactTag(${t.id})">비활성화</button>`:''}
                </td></tr>`).join('');
        }

        async function createGroup() {
            const accType = document.getElementById('newGroupAccType').value;
            await fetch('/api/v1/admin/tag-groups', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: document.getElementById('newGroupName').value,
                    display_order: +document.getElementById('newGroupOrder').value,
                    target_type: document.getElementById('newGroupTarget').value,
                    accommodation_type: accType || null })
            });
            document.getElementById('newGroupName').value = '';
            loadGroups();
        }

        async function editGroup(id) {
            const name = prompt('새 그룹명:', document.getElementById(`gname_${id}`).textContent);
            if (!name) return;
            await fetch(`/api/v1/admin/tag-groups/${id}`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, display_order: 0, accommodation_type: null })
            });
            loadGroups();
        }

        async function deactGroup(id) {
            if (!confirm('비활성화하시겠습니까?')) return;
            await fetch(`/api/v1/admin/tag-groups/${id}/deactivate`, { method: 'PATCH' });
            loadGroups();
        }

        async function createTag() {
            const gid = document.getElementById('groupSelect').value;
            await fetch(`/api/v1/admin/tag-groups/${gid}/tags`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: document.getElementById('newTagName').value,
                    display_order: +document.getElementById('newTagOrder').value })
            });
            document.getElementById('newTagName').value = '';
            loadTags();
        }

        async function editTag(id) {
            const gid = document.getElementById('groupSelect').value;
            const name = prompt('새 태그명:', document.getElementById(`tname_${id}`).textContent);
            if (!name) return;
            await fetch(`/api/v1/admin/tag-groups/${gid}/tags/${id}`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, display_order: 0 })
            });
            loadTags();
        }

        async function deactTag(id) {
            const gid = document.getElementById('groupSelect').value;
            await fetch(`/api/v1/admin/tag-groups/${gid}/tags/${id}/deactivate`, { method: 'PATCH' });
            loadTags();
        }

        loadGroups();
    </script>
</body>
</html>
