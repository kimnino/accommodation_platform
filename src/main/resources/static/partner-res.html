<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 관리 - 파트너</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; }
        .header { background: #2196F3; color: white; padding: 15px 20px; }
        .header a { color: white; text-decoration: none; margin-right: 15px; }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .section { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .section h3 { margin-bottom: 15px; border-bottom: 2px solid #FF5722; padding-bottom: 8px; }
        table { width: 100%; border-collapse: collapse; } th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; font-size: 13px; } th { background: #f9f9f9; }
        .btn { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; color: white; }
        .btn-confirm { background: #4CAF50; } .btn-cancel { background: #f44336; }
        .status { padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; display: inline-block; }
        .status.PAYMENT_WAITING { background: #FFF3E0; color: #E65100; }
        .status.CONFIRMED { background: #E8F5E9; color: #2E7D32; }
        .status.CANCELLED { background: #FFEBEE; color: #C62828; }
        .status.COMPLETED { background: #E3F2FD; color: #1565C0; }
        .status.PENDING { background: #F3E5F5; color: #6A1B9A; }
        .sel-row select { padding: 10px; font-size: 14px; border: 2px solid #FF5722; border-radius: 6px; }
        .empty { text-align: center; color: #999; padding: 30px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/partner.html">← 대시보드</a>
        <strong>예약 관리</strong>
    </div>
    <div class="container">
        <div class="sel-row" style="margin-bottom:15px">
            <label style="font-weight:bold">숙소 선택: </label>
            <select id="accSelect" onchange="loadReservations()"></select>
        </div>

        <div class="section">
            <h3>예약 현황</h3>
            <table>
                <thead><tr><th>예약번호</th><th>유형</th><th>날짜</th><th>투숙객</th><th>금액</th><th>상태</th><th>관리</th></tr></thead>
                <tbody id="resList"></tbody>
            </table>
        </div>
    </div>
    <script>
        const pid = new URLSearchParams(location.search).get('pid') || '1';

        async function loadAccSelect() {
            const res = await fetch(`/api/v1/extranet/accommodations`, { headers: { 'X-Partner-Id': pid } });
            const list = (await res.json()).data || [];
            document.getElementById('accSelect').innerHTML = list.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
            if (list.length > 0) loadReservations();
        }

        async function loadReservations() {
            const accId = document.getElementById('accSelect').value;
            const res = await fetch(`/api/v1/extranet/reservations/accommodations/${accId}`, { headers: { 'X-Partner-Id': pid } });
            const list = (await res.json()).data || [];

            document.getElementById('resList').innerHTML = list.length === 0
                ? '<tr><td colspan="7" class="empty">예약 내역이 없습니다.</td></tr>'
                : list.map(r => `<tr>
                    <td><small>${r.reservation_number}</small></td>
                    <td>${r.reservation_type}</td>
                    <td>${r.check_in_date} ~ ${r.check_out_date}</td>
                    <td>${r.guest_name}</td>
                    <td style="font-weight:bold">${Number(r.total_price).toLocaleString()}원</td>
                    <td><span class="status ${r.status}">${r.status}</span></td>
                    <td>
                        ${r.status==='PAYMENT_WAITING' ? `<button class="btn btn-confirm" onclick="confirmRes(${r.id})">확정</button>` : ''}
                        ${r.status!=='CANCELLED'&&r.status!=='COMPLETED' ? `<button class="btn btn-cancel" onclick="cancelRes(${r.id})">취소</button>` : ''}
                    </td>
                </tr>`).join('');
        }

        async function confirmRes(id) {
            await fetch(`/api/v1/extranet/reservations/${id}/confirm`, { method: 'PATCH' });
            loadReservations();
        }

        async function cancelRes(id) {
            const reason = prompt('취소 사유:');
            if (!reason) return;
            await fetch(`/api/v1/extranet/reservations/${id}/cancel`, {
                method: 'PATCH', headers: { 'Content-Type': 'application/json', 'X-Partner-Id': pid },
                body: JSON.stringify({ reason })
            });
            loadReservations();
        }

        loadAccSelect();
    </script>
</body>
</html>
