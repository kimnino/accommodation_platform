<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTA Platform API Tester</title>
<style>
:root {
    --bg-dark: #1e1e2e;
    --bg-sidebar: #252535;
    --bg-content: #f5f5f8;
    --bg-card: #ffffff;
    --bg-input: #2a2a3c;
    --text-light: #e0e0e8;
    --text-muted: #9090a0;
    --text-dark: #2c2c3a;
    --accent: #6c8cff;
    --accent-hover: #5a7aee;
    --green: #4caf80;
    --yellow: #e6a740;
    --red: #e05555;
    --border: #3a3a4e;
    --border-light: #ddd;
    --method-get: #61affe;
    --method-post: #49cc90;
    --method-put: #fca130;
    --method-patch: #9b59b6;
    --method-delete: #f93e3e;
    --json-string: #ce9178;
    --json-number: #b5cea8;
    --json-bool: #569cd6;
    --json-null: #808080;
    --json-key: #9cdcfe;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Segoe UI', -apple-system, sans-serif; display:flex; min-height:100vh; background: var(--bg-content); color: var(--text-dark); font-size:14px; }

/* Sidebar */
.sidebar { width:280px; min-width:280px; background:var(--bg-sidebar); color:var(--text-light); padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:16px; }
.sidebar h2 { font-size:16px; color:var(--accent); margin-bottom:4px; }
.sidebar h3 { font-size:13px; color:var(--text-muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:1px; }
.sidebar label { display:flex; align-items:center; gap:8px; cursor:pointer; padding:4px 0; font-size:13px; }
.sidebar input[type=radio] { accent-color: var(--accent); }
.sidebar input[type=text], .sidebar input[type=number] { background:var(--bg-input); border:1px solid var(--border); color:var(--text-light); padding:6px 10px; border-radius:4px; width:100%; font-size:13px; }
.sidebar button { background:var(--accent); color:#fff; border:none; padding:8px 16px; border-radius:4px; cursor:pointer; font-size:13px; font-weight:600; width:100%; }
.sidebar button:hover { background:var(--accent-hover); }
.auth-status { padding:8px 12px; border-radius:4px; font-size:12px; margin-top:4px; }
.auth-status.ok { background:rgba(76,175,128,0.15); color:var(--green); border:1px solid rgba(76,175,128,0.3); }
.auth-status.no { background:rgba(224,85,85,0.15); color:var(--red); border:1px solid rgba(224,85,85,0.3); }
.token-display { font-size:11px; color:var(--text-muted); word-break:break-all; margin-top:4px; }
.role-extra { margin-top:8px; }
.divider { border-top:1px solid var(--border); margin:4px 0; }

/* Main */
.main { flex:1; padding:24px; overflow-y:auto; }
.main h1 { font-size:22px; margin-bottom:4px; }
.main .subtitle { color:#888; font-size:13px; margin-bottom:20px; }

/* Groups */
.api-group { margin-bottom:20px; }
.api-group-title { font-size:14px; font-weight:700; color:var(--text-dark); padding:8px 12px; background:#e8e8f0; border-radius:6px; margin-bottom:8px; cursor:default; }

/* API Row */
.api-row { background:var(--bg-card); border:1px solid var(--border-light); border-radius:6px; margin-bottom:6px; overflow:hidden; }
.api-row-header { display:flex; align-items:center; gap:10px; padding:10px 14px; cursor:pointer; user-select:none; }
.api-row-header:hover { background:#f0f0f5; }
.method-badge { font-size:11px; font-weight:700; padding:3px 8px; border-radius:3px; color:#fff; min-width:56px; text-align:center; flex-shrink:0; }
.method-GET { background:var(--method-get); }
.method-POST { background:var(--method-post); }
.method-PUT { background:var(--method-put); }
.method-PATCH { background:var(--method-patch); }
.method-DELETE { background:var(--method-delete); }
.api-row-header .url { font-family:'Fira Code','Cascadia Code',monospace; font-size:13px; color:#555; }
.api-row-header .desc { margin-left:auto; font-size:12px; color:#999; flex-shrink:0; }
.api-row-header .arrow { transition:transform 0.2s; color:#aaa; flex-shrink:0; }
.i18n-badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:3px; background:rgba(108,140,255,0.12); color:var(--accent); border:1px solid rgba(108,140,255,0.35); flex-shrink:0; letter-spacing:0.3px; }
.api-row.open .api-row-header .arrow { transform:rotate(90deg); }

/* Expanded */
.api-row-body { display:none; padding:14px; border-top:1px solid var(--border-light); background:#fafafe; }
.api-row.open .api-row-body { display:block; }
.section-label { font-size:12px; font-weight:600; color:#666; margin:10px 0 4px; text-transform:uppercase; }
.section-label:first-child { margin-top:0; }
.url-builder { display:flex; flex-wrap:wrap; align-items:center; gap:6px; font-family:monospace; font-size:13px; margin-bottom:8px; }
.url-builder span { color:#888; }
.url-builder input { width:60px; padding:3px 6px; border:1px solid var(--border-light); border-radius:3px; font-family:monospace; font-size:13px; text-align:center; }

/* Query params */
.params-table { width:100%; border-collapse:collapse; margin-bottom:8px; }
.params-table td { padding:3px 4px; }
.params-table input, .params-table select { width:100%; padding:4px 6px; border:1px solid var(--border-light); border-radius:3px; font-size:12px; background:var(--bg-input); color:var(--text-light); }
.params-table select option[value=""] { color:var(--text-muted); }
.params-table .remove-btn { background:none; border:none; color:var(--red); cursor:pointer; font-size:16px; width:auto; padding:2px 6px; }
.add-param-btn { background:none; border:1px dashed var(--border-light); color:#888; padding:4px 10px; border-radius:3px; cursor:pointer; font-size:12px; width:auto; }
.add-param-btn:hover { border-color:var(--accent); color:var(--accent); }

/* API note */
.api-note { background:#f0f4ff; border-left:3px solid var(--accent); padding:8px 12px; border-radius:0 4px 4px 0; font-size:12px; color:#444; margin-bottom:10px; line-height:1.5; }

/* Body editor */
.body-editor { width:100%; min-height:120px; padding:10px; border:1px solid var(--border-light); border-radius:4px; font-family:'Fira Code','Cascadia Code',monospace; font-size:12px; resize:vertical; background:#fff; }

/* Send btn */
.send-btn { background:var(--accent); color:#fff; border:none; padding:8px 20px; border-radius:4px; cursor:pointer; font-weight:600; font-size:13px; margin-top:8px; width:auto; }
.send-btn:hover { background:var(--accent-hover); }
.send-btn:disabled { opacity:0.5; cursor:not-allowed; }

/* Response */
.response-area { margin-top:12px; border:1px solid var(--border-light); border-radius:4px; overflow:hidden; }
.response-header { display:flex; align-items:center; gap:12px; padding:8px 12px; background:#eee; font-size:12px; }
.status-badge { font-weight:700; padding:2px 8px; border-radius:3px; color:#fff; }
.status-2xx { background:var(--green); }
.status-4xx { background:var(--yellow); }
.status-5xx { background:var(--red); }
.status-other { background:#888; }
.response-time { color:#888; }
.response-body { padding:12px; background:#1e1e2e; color:#d4d4d4; font-family:'Fira Code','Cascadia Code',monospace; font-size:12px; max-height:400px; overflow:auto; white-space:pre-wrap; word-break:break-word; }
.response-error { padding:12px; background:#2e1e1e; color:var(--red); font-size:13px; }
.auth-warning { background:rgba(230,167,64,0.1); border:1px solid rgba(230,167,64,0.3); padding:8px 12px; border-radius:4px; color:#b8860b; font-size:12px; margin-top:8px; }

/* Security test */
.security-section { background:var(--bg-card); border:1px solid var(--border-light); border-radius:6px; padding:16px; margin-top:24px; }
.security-section h3 { margin-bottom:12px; }
.sec-test { display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid #eee; }
.sec-test:last-child { border-bottom:none; }
.sec-test button { background:#555; color:#fff; border:none; padding:6px 14px; border-radius:4px; cursor:pointer; font-size:12px; white-space:nowrap; flex-shrink:0; width:auto; }
.sec-test button:hover { background:#444; }
.sec-test .result { font-size:12px; font-family:monospace; }
.sec-test .pass { color:var(--green); font-weight:600; }
.sec-test .fail { color:var(--red); font-weight:600; }

/* Loading */
.loading { display:inline-block; width:14px; height:14px; border:2px solid #ccc; border-top-color:var(--accent); border-radius:50%; animation:spin 0.6s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Tabs */
.tab-bar { display:flex; gap:4px; margin-bottom:20px; border-bottom:2px solid var(--border-light); }
.tab-btn { padding:8px 20px; border:none; background:none; cursor:pointer; font-size:14px; font-weight:600; color:#888; border-bottom:2px solid transparent; margin-bottom:-2px; transition:color 0.15s, border-color 0.15s; }
.tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
.tab-btn:hover:not(.active) { color:var(--text-dark); }
.tab-pane { display:none; }
.tab-pane.active { display:block; }

/* Scenario */
.scenario-section { margin-bottom:28px; }
.scenario-section-title { font-size:15px; font-weight:700; color:var(--text-dark); margin-bottom:12px; padding-left:4px; border-left:3px solid var(--accent); padding-left:10px; }
.scenario-card { background:var(--bg-card); border:1px solid var(--border-light); border-radius:8px; margin-bottom:12px; overflow:hidden; }
.scenario-card-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:#f8f8fc; border-bottom:1px solid var(--border-light); }
.scenario-card-title { font-size:13px; font-weight:700; color:var(--text-dark); }
.scenario-card-desc { font-size:12px; color:#888; margin-top:2px; }
.scenario-run-btn { background:var(--accent); color:#fff; border:none; padding:7px 18px; border-radius:4px; cursor:pointer; font-size:13px; font-weight:600; white-space:nowrap; flex-shrink:0; }
.scenario-run-btn:hover { background:var(--accent-hover); }
.scenario-run-btn:disabled { opacity:0.5; cursor:not-allowed; }
.scenario-steps { padding:12px 16px; }
.scenario-step { border:1px solid var(--border-light); border-radius:6px; margin-bottom:8px; overflow:hidden; }
.scenario-step:last-child { margin-bottom:0; }
.step-header { display:flex; align-items:center; gap:10px; padding:8px 12px; background:#fafafe; }
.step-num { font-size:11px; font-weight:700; color:#fff; background:#aaa; border-radius:3px; padding:2px 7px; flex-shrink:0; min-width:52px; text-align:center; }
.step-num.running { background:var(--accent); }
.step-num.success { background:var(--green); }
.step-num.failed { background:var(--red); }
.step-num.skipped { background:#bbb; }
.step-method { font-size:11px; font-weight:700; color:#fff; padding:2px 7px; border-radius:3px; flex-shrink:0; }
.step-url { font-family:monospace; font-size:12px; color:#555; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.step-expect { font-size:11px; color:#888; flex-shrink:0; }
.step-result { padding:0 12px 10px; display:none; }
.step-result.visible { display:block; }
.step-result-line { display:flex; align-items:center; gap:8px; font-size:12px; margin-top:6px; }
.step-result-body { margin-top:6px; background:#1e1e2e; color:#d4d4d4; font-family:monospace; font-size:11px; padding:8px 10px; border-radius:4px; max-height:200px; overflow:auto; white-space:pre-wrap; word-break:break-word; }
.expect-ok { color:var(--green); font-weight:700; }
.expect-fail { color:var(--red); font-weight:700; }

@media(max-width:768px) {
    body { flex-direction:column; }
    .sidebar { width:100%; min-width:100%; flex-direction:row; flex-wrap:wrap; padding:12px; gap:8px; }
    .main { padding:12px; }
}
</style>
</head>
<body>

<div class="sidebar">
    <div>
        <h2>OTA API Tester</h2>
        <p style="font-size:11px;color:var(--text-muted)">v1.0 - API 요청/응답 테스트 도구</p>
    </div>
    <div class="divider"></div>
    <div>
        <h3>역할 선택</h3>
        <label><input type="radio" name="role" value="ADMIN" checked> 관리자 (ADMIN)</label>
        <label><input type="radio" name="role" value="PARTNER"> 파트너 (PARTNER)</label>
        <label><input type="radio" name="role" value="CUSTOMER"> 고객 (CUSTOMER)</label>
        <div class="role-extra" id="partnerExtra" style="display:none">
            <label style="font-size:12px;color:var(--text-muted)">Partner ID</label>
            <input type="number" id="partnerId" value="1" min="1">
        </div>
        <div class="role-extra" id="customerExtra" style="display:none">
            <label style="font-size:12px;color:var(--text-muted)">Member ID</label>
            <input type="number" id="memberId" value="1" min="1">
        </div>
    </div>
    <button onclick="issueToken()">토큰 발급</button>
    <div>
        <div id="authStatus" class="auth-status no">미인증</div>
        <div id="tokenDisplay" class="token-display"></div>
    </div>
    <div class="divider"></div>
    <div>
        <h3>언어 (Accept-Language)</h3>
        <label><input type="radio" name="locale" value="" checked> 기본 (ko)</label>
        <label><input type="radio" name="locale" value="en"> 영어 (en)</label>
        <label><input type="radio" name="locale" value="ja"> 일본어 (ja)</label>
        <div style="font-size:11px;color:var(--text-muted);margin-top:8px;line-height:1.6;">
            🌐 <span style="color:var(--accent);font-weight:600;">i18n</span> 배지가 있는 API만 적용됩니다.<br>
            <span style="color:#6c6c80;">• 숙소 검색<br>• 숙소 상세</span>
        </div>
    </div>
    <div class="divider"></div>
    <div>
        <h3>Base URL</h3>
        <input type="text" id="baseUrl" value="http://localhost:8080">
    </div>
</div>

<div class="main">
    <h1>API Endpoint Tester</h1>
    <p class="subtitle">OTA 숙박 플랫폼 백엔드 API 테스트 도구</p>

    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('apiListTab', this)">API 목록</button>
        <button class="tab-btn" onclick="switchTab('scenarioTab', this)">시나리오</button>
    </div>

    <div id="apiListTab" class="tab-pane active">
        <div id="apiList"></div>
    </div>

    <div id="scenarioTab" class="tab-pane">
        <div id="scenarioList"></div>
    </div>

    <div class="security-section">
        <h3>보안 테스트</h3>
        <p style="font-size:12px;color:#888;margin-bottom:12px;">인증/인가가 올바르게 동작하는지 확인합니다.</p>
        <div class="sec-test">
            <button onclick="secTest1()">CUSTOMER 토큰으로 Admin API 호출</button>
            <span class="result" id="secResult1">-</span>
        </div>
        <div class="sec-test">
            <button onclick="secTest2()">토큰 없이 파트너 API 호출</button>
            <span class="result" id="secResult2">-</span>
        </div>
        <div class="sec-test">
            <button onclick="secTest3()">PARTNER 토큰으로 다른 파트너 숙소 접근</button>
            <span class="result" id="secResult3">-</span>
        </div>
    </div>
</div>

<script>
let currentToken = null;
let currentRole = null;

function getCurrentLocale() {
    const sel = document.querySelector('input[name="locale"]:checked');
    return sel ? sel.value : '';
}

const OPTS = {
    accommodationType: [
        {label:"없음",value:""},{label:"HOTEL",value:"HOTEL"},{label:"MOTEL",value:"MOTEL"},
        {label:"RESORT",value:"RESORT"},{label:"PENSION",value:"PENSION"},
        {label:"POOL_VILLA",value:"POOL_VILLA"},{label:"GUEST_HOUSE",value:"GUEST_HOUSE"}
    ],
    targetType: [
        {label:"없음",value:""},{label:"ACCOMMODATION",value:"ACCOMMODATION"},{label:"ROOM",value:"ROOM"}
    ],
    priceType: [
        {label:"없음",value:""},{label:"STAY",value:"STAY"},{label:"HOURLY",value:"HOURLY"}
    ],
    cancellationPolicy: [
        {label:"없음",value:""},{label:"FREE_CANCELLATION",value:"FREE_CANCELLATION"},
        {label:"NON_REFUNDABLE",value:"NON_REFUNDABLE"},{label:"PARTIAL_REFUND",value:"PARTIAL_REFUND"}
    ],
    sort: [
        {label:"없음",value:""},{label:"최신순",value:"latest"},
        {label:"가격낮은순",value:"price_asc"},{label:"가격높은순",value:"price_desc"}
    ],
    booleanOpt: [
        {label:"없음",value:""},{label:"true",value:"true"},{label:"false",value:"false"}
    ]
};

function sel(key, opts, defaultVal) {
    return {key, type:'select', value: defaultVal || '', options: OPTS[opts]};
}
function txt(key, value) {
    return {key, value: value != null ? String(value) : ''};
}

const API_ENDPOINTS = [
    {
        group: "인증 (Auth)",
        endpoints: [
            { method:"POST", url:"/api/v1/auth/token", desc:"토큰 발급",
              note:"role(ADMIN/PARTNER/CUSTOMER) 선택 후 발급. PARTNER는 partner_id, CUSTOMER는 member_id 추가 필요. 발급된 토큰은 사이드바에 자동 저장됨.",
              body: { role: "ADMIN" } }
        ]
    },
    {
        group: "고객 (Customer) - 공개",
        endpoints: [
            { method:"GET", url:"/api/v1/regions", desc:"지역 목록 조회 (트리)",
              note:"숙소 유형별 지역 트리 반환. accommodationType 없으면 전체 유형 지역 반환. 검색 UI의 지역 드롭다운 데이터 소스로 사용.",
              params:[sel("accommodationType","accommodationType","HOTEL")]},
            { method:"GET", url:"/api/v1/tags", desc:"태그 목록 조회 (필터용)",
              note:"숙소 검색 필터 UI용 태그 목록. targetType=ACCOMMODATION + accommodationType 지정 시 해당 유형 전용 태그만 반환. tagIds 파라미터에 넣을 id 값 확인용.",
              params:[sel("targetType","targetType","ACCOMMODATION"), sel("accommodationType","accommodationType","HOTEL")]},
            { method:"GET", url:"/api/v1/accommodations", desc:"숙소 검색", i18n:true,
              note:"2단계 배치 조회: 1단계 region_id/날짜/인원/가격/태그로 ID 필터링 → 2단계 카드 데이터 로딩. tag_ids는 쉼표 구분(예: 1,2,3). region_id는 지역 API에서 확인. Accept-Language 헤더로 ko/en/ja 번역 반환.",
              params:[{key:"region_id", type:"region-select", value:""}, txt("check_in_date","2026-04-25"), txt("check_out_date","2026-04-26"), txt("guest_count","2"), sel("accommodationType","accommodationType","HOTEL"), txt("min_price",""), txt("max_price",""), txt("tag_ids",""), sel("sort","sort","")]},
            { method:"GET", url:"/api/v1/accommodations/{id}", desc:"숙소 상세", i18n:true,
              note:"숙소 상세 + 객실 목록 + 옵션별 요금/재고 반환. check_in_date/check_out_date 필수. Accept-Language 헤더로 다국어 지원.",
              params:[txt("check_in_date","2026-04-25"), txt("check_out_date","2026-04-26")]}
        ]
    },
    {
        group: "고객 (Customer) - 인증 필요",
        endpoints: [
            { method:"POST", url:"/api/v1/reservations/stay", desc:"숙박 예약",
              note:"CUSTOMER 토큰 필요. reservation_request_id는 중복 방지용 UUID(자동 생성됨). 재고 차감 후 PENDING 상태로 생성. 이후 confirm-payment로 결제 확인.",
              body:{reservation_request_id:"__UUID__", accommodation_id:1, room_option_id:1, check_in_date:"2026-04-25", check_out_date:"2026-04-26", guest_name:"홍길동", guest_phone:"010-1234-5678", guest_email:"test@test.com"}},
            { method:"POST", url:"/api/v1/reservations/hourly", desc:"대실 예약",
              note:"CUSTOMER 토큰 필요. 모텔 대실 전용. date + start_time/end_time 지정. room_option의 price_type이 HOURLY인 옵션만 사용 가능. accommodation_id=4, room_option_id=7(역삼 모텔 201호)로 테스트 가능.",
              body:{reservation_request_id:"__UUID__", accommodation_id:4, room_option_id:7, date:"2026-04-25", start_time:"14:00", end_time:"18:00", guest_name:"홍길동", guest_phone:"010-1234-5678", guest_email:"test@test.com"}},
            { method:"POST", url:"/api/v1/reservations/{id}/confirm-payment", desc:"결제 확인",

function getBaseUrl() {
    return document.getElementById('baseUrl').value.replace(/\/+$/, '');
}

function getSelectedRole() {
    return document.querySelector('input[name="role"]:checked').value;
}

// Role selector handling
document.querySelectorAll('input[name="role"]').forEach(r => {
    r.addEventListener('change', () => {
        document.getElementById('partnerExtra').style.display = r.value === 'PARTNER' ? 'block' : 'none';
        document.getElementById('customerExtra').style.display = r.value === 'CUSTOMER' ? 'block' : 'none';
    });
});

function generateUUID() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
}

function prepareBody(body) {
    if (!body) return null;
    const clone = JSON.parse(JSON.stringify(body));
    for (const k in clone) {
        if (clone[k] === '__UUID__') clone[k] = generateUUID();
    }
    return clone;
}

async function issueToken() {
    const role = getSelectedRole();
    const body = { role };
    if (role === 'PARTNER') body.partner_id = parseInt(document.getElementById('partnerId').value) || 1;
    if (role === 'CUSTOMER') body.member_id = parseInt(document.getElementById('memberId').value) || 1;

    try {
        const resp = await fetch(getBaseUrl() + '/api/v1/auth/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        const data = await resp.json();
        if (resp.ok && data.data && data.data.token) {
            currentToken = data.data.token;
            currentRole = role;
            const statusEl = document.getElementById('authStatus');
            statusEl.className = 'auth-status ok';
            statusEl.textContent = '인증됨 \u2713 (' + role + ')';
            const truncated = currentToken.length > 40 ? currentToken.substring(0, 40) + '...' : currentToken;
            document.getElementById('tokenDisplay').textContent = truncated;
            if (data.data.expires_at) {
                document.getElementById('tokenDisplay').textContent += '\n만료: ' + data.data.expires_at;
            }
        } else {
            // Try alternate response structures
            if (data.token) {
                currentToken = data.token;
                currentRole = role;
                const statusEl = document.getElementById('authStatus');
                statusEl.className = 'auth-status ok';
                statusEl.textContent = '인증됨 \u2713 (' + role + ')';
                const truncated = currentToken.length > 40 ? currentToken.substring(0, 40) + '...' : currentToken;
                document.getElementById('tokenDisplay').textContent = truncated;
            } else {
                alert('토큰 발급 실패: ' + JSON.stringify(data));
            }
        }
    } catch (e) {
        alert('토큰 발급 요청 실패: ' + e.message);
    }
}

function syntaxHighlight(json) {
    if (typeof json !== 'string') json = JSON.stringify(json, null, 2);
    return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?|\bnull\b)/g, match => {
            let cls = 'json-number';
            if (/^"/.test(match)) {
                cls = /:$/.test(match) ? 'json-key' : 'json-string';
            } else if (/true|false/.test(match)) {
                cls = 'json-bool';
            } else if (/null/.test(match)) {
                cls = 'json-null';
            }
            return '<span style="color:var(--' + cls + ')">' + match + '</span>';
        });
}

function extractPathParams(urlTemplate) {
    const matches = urlTemplate.match(/\{(\w+)\}/g) || [];
    return matches.map(m => m.replace(/[{}]/g, ''));
}

function buildUrlFromInputs(rowEl, urlTemplate) {
    let url = urlTemplate;
    const params = extractPathParams(urlTemplate);
    params.forEach(p => {
        const input = rowEl.querySelector('.path-param-' + p);
        const val = input ? input.value : '1';
        url = url.replace('{' + p + '}', encodeURIComponent(val));
    });
    // query params
    const paramRows = rowEl.querySelectorAll('.query-param-row');
    const qp = [];
    paramRows.forEach(pr => {
        const k = pr.querySelector('.qp-key').value.trim();
        const valEl = pr.querySelector('.qp-value');
        const v = valEl ? valEl.value.trim() : '';
        if (k && v) qp.push(encodeURIComponent(k) + '=' + encodeURIComponent(v));
    });
    if (qp.length) url += '?' + qp.join('&');
    return url;
}

const EP_MAP = {};

function renderApiList() {
    const container = document.getElementById('apiList');
    let html = '';
    let idx = 0;
    API_ENDPOINTS.forEach(group => {
        html += '<div class="api-group">';
        html += '<div class="api-group-title">' + group.group + '</div>';
        group.endpoints.forEach(ep => {
            const id = 'api-' + idx;
            const pathParams = extractPathParams(ep.url);
            html += '<div class="api-row" id="' + id + '">';
            html += '<div class="api-row-header" onclick="toggleRow(\'' + id + '\')">';
            html += '<span class="method-badge method-' + ep.method + '">' + ep.method + '</span>';
            html += '<span class="url">' + ep.url + '</span>';
            if (ep.i18n) html += '<span class="i18n-badge">🌐 i18n</span>';
            html += '<span class="desc">' + ep.desc + '</span>';
            html += '<span class="arrow">&#9654;</span>';
            html += '</div>';
            html += '<div class="api-row-body">';

            // Note
            if (ep.note) {
                html += '<div class="api-note">💡 ' + ep.note + '</div>';
            }

            // URL builder
            html += '<div class="section-label">URL</div>';
            html += '<div class="url-builder">';
            const parts = ep.url.split(/(\{[^}]+\})/);
            parts.forEach(part => {
                const m = part.match(/^\{(\w+)\}$/);
                if (m) {
                    html += '<input class="path-param-' + m[1] + '" placeholder="' + m[1] + '" value="1">';
                } else {
                    html += '<span>' + part + '</span>';
                }
            });
            html += '</div>';

            // Query params
            if (ep.method === 'GET' || ep.params) {
                html += '<div class="section-label">Query Parameters</div>';
                html += '<table class="params-table"><tbody class="qp-body">';
                if (ep.params) {
                    ep.params.forEach(p => {
                        let valHtml;
                        if (p.type === 'select' && p.options) {
                            valHtml = '<select class="qp-value">';
                            p.options.forEach(o => {
                                valHtml += '<option value="' + o.value + '"' + (o.value === p.value ? ' selected' : '') + '>' + o.label + '</option>';
                            });
                            valHtml += '</select>';
                        } else if (p.type === 'region-select') {
                            valHtml = '<select class="qp-value region-select"><option value="">없음 (전체)</option></select>';
                        } else {
                            valHtml = '<input class="qp-value" value="' + (p.value || '') + '" placeholder="값 없으면 전송 안 함">';
                        }
                        html += '<tr class="query-param-row"><td><input class="qp-key" value="' + p.key + '" placeholder="key" style="background:#1e1e2e;color:#888;"></td><td>' + valHtml + '</td><td><button class="remove-btn" onclick="this.closest(\'tr\').remove()">&times;</button></td></tr>';
                    });
                }
                html += '</tbody></table>';
                html += '<button class="add-param-btn" onclick="addParam(this)">+ 파라미터 추가</button>';
            }

            // Request body
            if (ep.body) {
                html += '<div class="section-label">Request Body</div>';
                const bodyStr = JSON.stringify(prepareBody(ep.body), null, 2);
                html += '<textarea class="body-editor">' + bodyStr + '</textarea>';
            }

            EP_MAP[id] = ep;
            html += '<button class="send-btn" onclick="sendRequest(\'' + id + '\', EP_MAP[\'' + id + '\'])">요청 보내기</button>';

            // Response area placeholder
            html += '<div class="response-container"></div>';

            html += '</div></div>';
            idx++;
        });
        html += '</div>';
    });
    container.innerHTML = html;
}

function toggleRow(id) {
    const el = document.getElementById(id);
    el.classList.toggle('open');
    if (el.classList.contains('open')) initDynamicSelects(el);
}

function initDynamicSelects(rowEl) {
    const regionSel = rowEl.querySelector('.region-select');
    if (!regionSel) return;
    rowEl.querySelectorAll('.query-param-row').forEach(tr => {
        const k = tr.querySelector('.qp-key')?.value;
        if (k === 'accommodationType') {
            const accSel = tr.querySelector('.qp-value');
            if (accSel && !accSel.dataset.regionHooked) {
                accSel.dataset.regionHooked = '1';
                accSel.addEventListener('change', () => populateRegionSelect(rowEl));
            }
        }
    });
    populateRegionSelect(rowEl);
}

async function populateRegionSelect(rowEl) {
    const regionSel = rowEl.querySelector('.region-select');
    if (!regionSel) return;
    let accType = '';
    rowEl.querySelectorAll('.query-param-row').forEach(tr => {
        if (tr.querySelector('.qp-key')?.value === 'accommodationType') {
            accType = tr.querySelector('.qp-value')?.value || '';
        }
    });
    regionSel.innerHTML = '<option value="">없음</option>';
    try {
        const url = getBaseUrl() + '/api/v1/regions' + (accType ? '?accommodationType=' + accType : '');
        const resp = await fetch(url);
        const json = await resp.json();
        flattenRegionTree(json.data || [], '', regionSel);
    } catch(e) { regionSel.innerHTML = '<option value="">로드 실패</option>'; }
}

function flattenRegionTree(nodes, prefix, selectEl) {
    nodes.forEach(n => {
        const label = prefix ? prefix + ' > ' + n.region_name : n.region_name;
        const opt = document.createElement('option');
        opt.value = n.id; opt.textContent = label;
        selectEl.appendChild(opt);
        if (n.children?.length) flattenRegionTree(n.children, label, selectEl);
    });
}

async function sendRequest(rowId, ep) {
    const rowEl = document.getElementById(rowId);
    const url = getBaseUrl() + buildUrlFromInputs(rowEl, ep.url);
    const headers = { 'Content-Type': 'application/json' };
    if (currentToken) headers['Authorization'] = 'Bearer ' + currentToken;
    const locale = getCurrentLocale();
    if (locale) headers['Accept-Language'] = locale;

    const opts = { method: ep.method, headers };
    if (ep.body) {
        const textarea = rowEl.querySelector('.body-editor');
        if (textarea) {
            try {
                opts.body = textarea.value;
                JSON.parse(opts.body); // validate
            } catch (e) {
                alert('JSON 형식 오류: ' + e.message);
                return;
            }
        }
    }

    const container = rowEl.querySelector('.response-container');
    container.innerHTML = '<div style="padding:12px"><span class="loading"></span> 요청 중...</div>';

    const start = performance.now();
    try {
        const resp = await fetch(url, opts);
        const elapsed = Math.round(performance.now() - start);
        let bodyText = await resp.text();
        let bodyJson = null;
        try { bodyJson = JSON.parse(bodyText); } catch(e) {}

        const statusClass = resp.status < 300 ? 'status-2xx' : resp.status < 500 ? 'status-4xx' : 'status-5xx';
        let html = '<div class="response-area">';
        html += '<div class="response-header">';
        html += '<span class="status-badge ' + statusClass + '">' + resp.status + ' ' + resp.statusText + '</span>';
        html += '<span class="response-time">' + elapsed + 'ms</span>';
        html += '<span class="response-time">' + new Date().toISOString() + '</span>';
        html += '</div>';

        if (bodyJson !== null) {
            html += '<div class="response-body">' + syntaxHighlight(JSON.stringify(bodyJson, null, 2)) + '</div>';
        } else {
            html += '<div class="response-body">' + (bodyText || '(empty response)') + '</div>';
        }
        html += '</div>';

        if (resp.status === 401) {
            html += '<div class="auth-warning">인증이 필요합니다. 좌측에서 토큰을 발급해주세요.</div>';
        } else if (resp.status === 403) {
            html += '<div class="auth-warning">권한이 없습니다. 해당 API에 접근할 수 있는 역할로 토큰을 발급해주세요.</div>';
        }

        container.innerHTML = html;
    } catch (e) {
        const elapsed = Math.round(performance.now() - start);
        container.innerHTML = '<div class="response-area"><div class="response-error">요청 실패 (' + elapsed + 'ms): ' + e.message + '<br><br>서버가 실행 중인지 확인해주세요. Base URL: ' + getBaseUrl() + '</div></div>';
    }
}

async function securityTest(tokenOverride, url, method, expectedStatus, resultElId) {
    const el = document.getElementById(resultElId);
    el.innerHTML = '<span class="loading"></span>';
    const headers = { 'Content-Type': 'application/json' };
    if (tokenOverride) headers['Authorization'] = 'Bearer ' + tokenOverride;

    try {
        const resp = await fetch(getBaseUrl() + url, { method, headers });
        if (resp.status === expectedStatus) {
            el.innerHTML = '<span class="pass">PASS</span> - ' + resp.status + ' ' + resp.statusText;
        } else {
            el.innerHTML = '<span class="fail">FAIL</span> - 예상: ' + expectedStatus + ', 실제: ' + resp.status + ' ' + resp.statusText;
        }
    } catch (e) {
        el.innerHTML = '<span class="fail">ERROR</span> - ' + e.message;
    }
}

async function getTokenForRole(role) {
    const body = { role };
    if (role === 'PARTNER') body.partner_id = 1;
    if (role === 'CUSTOMER') body.member_id = 1;
    try {
        const resp = await fetch(getBaseUrl() + '/api/v1/auth/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        const data = await resp.json();
        if (data.data && data.data.token) return data.data.token;
        if (data.token) return data.token;
    } catch (e) {}
    return null;
}

const METHOD_COLORS = { GET:'var(--method-get)', POST:'var(--method-post)', PUT:'var(--method-put)', PATCH:'var(--method-patch)', DELETE:'var(--method-delete)' };

    const container = document.getElementById('scenarioList');

    SCENARIO_SECTIONS.forEach(sec => {
        const scenarios = SCENARIOS.filter(s => s.channel === sec.key);
        if (!scenarios.length) return;
        html += '<div class="scenario-section">';
        html += '<div class="scenario-section-title">' + sec.title + '</div>';

            html += '<div class="scenario-card" id="sc-' + sc.id + '">';

            html += '<button class="scenario-run-btn" id="run-btn-' + sc.id + '" onclick="runScenario(\'' + sc.id + '\')">실행</button>';
            html += '</div>';
            html += '<div class="scenario-steps" id="sc-steps-' + sc.id + '">';
            sc.steps.forEach((step, i) => {
                const displayUrl = step.urlTemplate + (step.query ? '?' + Object.entries(step.query).map(([k,v]) => k + '=' + v).join('&') : '');
                const methodColor = METHOD_COLORS[step.method] || '#888';
                const expectLabel = step.expectedStatus ? ' <span style="color:#888">기대: ' + step.expectedStatus + '</span>' : '';
                html += '<div class="scenario-step" id="sc-step-' + sc.id + '-' + i + '">';
                html += '<div class="step-header">';
                html += '<span class="step-num" id="sc-step-num-' + sc.id + '-' + i + '">' + step.label + '</span>';
                html += '<span class="step-method" style="background:' + methodColor + '">' + step.method + '</span>';

                html += '</div>';
                html += '<div class="step-result" id="sc-step-result-' + sc.id + '-' + i + '"></div>';
                html += '</div>';
            });
            html += '</div></div>';
        });
        html += '</div>';
    });
    container.innerHTML = html;
}

function buildScenarioUrl(urlTemplate, idStore, query) {
    let url = urlTemplate;
    Object.entries(idStore).forEach(([k, v]) => {
        url = url.replace('{' + k + '}', encodeURIComponent(v));
    });
    if (query) {
        const qs = Object.entries(query).map(([k,v]) => encodeURIComponent(k) + '=' + encodeURIComponent(v)).join('&');
        url += '?' + qs;
    }
    return url;
}

function prepareScenarioBody(body) {
    if (!body) return null;
    const clone = JSON.parse(JSON.stringify(body));
    for (const k in clone) {
        if (clone[k] === '{{uuid}}') clone[k] = generateUUID();
    }
    return clone;
}

async function runScenario(scenarioId) {
    const sc = SCENARIOS.find(s => s.id === scenarioId);
    if (!sc) return;

    if (!currentToken) {
        alert('토큰이 없습니다. 사이드바에서 해당 채널 토큰을 먼저 발급해주세요.');
        return;
    }

    const runBtn = document.getElementById('run-btn-' + scenarioId);
    runBtn.disabled = true;
    runBtn.textContent = '실행 중...';

    // Reset step visuals
    sc.steps.forEach((_, i) => {
        const numEl = document.getElementById('sc-step-num-' + scenarioId + '-' + i);
        const resEl = document.getElementById('sc-step-result-' + scenarioId + '-' + i);
        numEl.className = 'step-num';
        numEl.textContent = sc.steps[i].label;
        resEl.className = 'step-result';
        resEl.innerHTML = '';
    });

    const idStore = {};
    let failed = false;

    for (let i = 0; i < sc.steps.length; i++) {
        const step = sc.steps[i];
        const numEl = document.getElementById('sc-step-num-' + scenarioId + '-' + i);
        const resEl = document.getElementById('sc-step-result-' + scenarioId + '-' + i);

        if (failed) {
            numEl.className = 'step-num skipped';
            numEl.textContent = 'SKIPPED';
            resEl.className = 'step-result visible';
            resEl.innerHTML = '<div class="step-result-line" style="color:#aaa">이전 스텝 실패로 건너뜀</div>';
            continue;
        }

        numEl.className = 'step-num running';
        numEl.textContent = '실행 중...';

        const url = getBaseUrl() + buildScenarioUrl(step.urlTemplate, idStore, step.query);
        const headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + currentToken };
        const locale = getCurrentLocale();
        if (locale) headers['Accept-Language'] = locale;
        if (sc.channel === 'partner') {
            const pid = document.getElementById('partnerId')?.value || '1';
            headers['X-Partner-Id'] = pid;
        }

        const fetchOpts = { method: step.method, headers };
        const bodyData = prepareScenarioBody(step.body);
        if (bodyData) fetchOpts.body = JSON.stringify(bodyData);

        const start = performance.now();
        let status = 0, statusText = '', bodyJson = null, bodyRaw = '';

        try {
            const resp = await fetch(url, fetchOpts);
            const elapsed = Math.round(performance.now() - start);
            status = resp.status;
            statusText = resp.statusText;
            bodyRaw = await resp.text();
            try { bodyJson = JSON.parse(bodyRaw); } catch(e) {}

            // Extract ID if configured
            if (step.extractId && bodyJson) {
                const extractedId = step.extractId(bodyJson);
                if (extractedId != null && step.idKey) {
                    idStore[step.idKey] = extractedId;
                }
            }

            // Determine pass/fail
            const expectedStatus = step.expectedStatus;
            let stepOk;
            if (expectedStatus) {
                stepOk = (status === expectedStatus);
            } else {
                stepOk = (status >= 200 && status < 300);
            }

            // allowFail: step failure doesn't stop the chain (used in S-C3 STEP 2)
            if (!stepOk && !step.allowFail) failed = true;

            numEl.className = 'step-num ' + (stepOk ? 'success' : 'failed');
            numEl.textContent = stepOk ? (step.label + ' ✅') : (step.label + ' ❌');

            const statusClass = status < 300 ? 'status-2xx' : status < 500 ? 'status-4xx' : 'status-5xx';
            const statusColor = status < 300 ? 'var(--green)' : status < 500 ? 'var(--yellow)' : 'var(--red)';

            let expectHtml = '';
            if (expectedStatus) {
                const matchIcon = stepOk ? '<span class="expect-ok">✅ 기대 결과 일치</span>' : '<span class="expect-fail">❌ 기대 결과 불일치</span>';
                expectHtml = '<div class="step-result-line">' + matchIcon + ' (기대: ' + expectedStatus + ', 실제: ' + status + ')</div>';
            }

            const idInfo = step.idKey && idStore[step.idKey] != null
                ? '<div class="step-result-line" style="color:var(--accent)">추출된 ID (' + step.idKey + '): ' + idStore[step.idKey] + '</div>'
                : '';

            const bodyPreview = bodyJson != null
                ? syntaxHighlight(JSON.stringify(bodyJson, null, 2))
                : (bodyRaw || '(empty)');

            resEl.className = 'step-result visible';
            resEl.innerHTML =
                '<div class="step-result-line">' +
                '<span style="font-weight:700;color:' + statusColor + '">' + status + ' ' + statusText + '</span>' +
                '<span style="color:#aaa;font-size:11px">' + elapsed + 'ms</span>' +
                '</div>' +
                expectHtml +
                idInfo +
                '<div class="step-result-body">' + bodyPreview + '</div>';

        } catch(e) {
            const elapsed = Math.round(performance.now() - start);
            failed = true;
            numEl.className = 'step-num failed';
            numEl.textContent = step.label + ' ❌';
            resEl.className = 'step-result visible';
            resEl.innerHTML = '<div class="step-result-line" style="color:var(--red)">요청 실패 (' + elapsed + 'ms): ' + e.message + '</div>';
        }
    }

    runBtn.disabled = false;
    runBtn.textContent = failed ? '다시 실행' : '완료 — 재실행';
}

renderScenarioList();
</script>
</body>
</html>
