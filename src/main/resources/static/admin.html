<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#f5f5f5}
        .header{background:#FF5722;color:white;padding:15px 20px;display:flex;justify-content:space-between}
        .header a{color:white;text-decoration:none}
        .container{max-width:800px;margin:30px auto;padding:0 20px}
        h1{text-align:center;margin-bottom:30px;color:#333}
        .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
        .card{background:white;border-radius:12px;padding:25px;box-shadow:0 2px 8px rgba(0,0,0,.1);
              cursor:pointer;transition:transform .2s;border-left:4px solid #FF5722}
        .card:hover{transform:translateY(-3px)} .card h3{margin-bottom:8px} .card p{color:#666;font-size:13px}
    </style>
</head>
<body>
    <div class="header"><a href="/">← 홈</a><strong>관리자 패널</strong><span></span></div>
    <div class="container">
        <h1>관리자 대시보드</h1>
        <div class="cards">
            <div class="card" onclick="location.href='/admin-acc.html'"><h3>숙소 관리</h3><p>승인, 정지, 폐쇄, 수정요청 처리</p></div>
            <div class="card" onclick="location.href='/admin-price.html'"><h3>가격 조정</h3><p>객실 옵션별 판매가 조정</p></div>
            <div class="card" onclick="location.href='/admin-tags.html'"><h3>태그 관리</h3><p>태그 그룹/태그 CRUD</p></div>
        </div>
    </div>
</body>
</html>
