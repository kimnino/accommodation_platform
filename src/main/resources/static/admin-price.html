<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가격 조정 - 관리자</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#f5f5f5}
        .header{background:#FF5722;color:white;padding:15px 20px}.header a{color:white;text-decoration:none;margin-right:15px}
        .container{max-width:900px;margin:20px auto;padding:0 20px}
        .section{background:white;border-radius:12px;padding:20px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
        .section h3{margin-bottom:15px;border-bottom:2px solid #FF5722;padding-bottom:8px}
        .form-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;align-items:end}
        .form-row label{display:block;font-size:12px;color:#666;margin-bottom:3px}
        .form-row input,.form-row select{padding:8px;border:1px solid #ddd;border-radius:4px;font-size:14px}
        .btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;color:white;background:#FF5722}
        .result{margin-top:10px;font-size:13px;color:#4CAF50;font-weight:bold}
    </style>
</head>
<body>
    <div class="header"><a href="/admin.html">← 대시보드</a><strong>가격 조정</strong></div>
    <div class="container">
        <div class="section">
            <h3>객실 옵션 판매가 조정</h3>
            <p style="font-size:13px;color:#666;margin-bottom:15px">프로모션, 긴급 가격 변경 등 관리자가 직접 판매가를 조정합니다.</p>
            <div class="form-row">
                <div><label>객실 옵션 ID</label><input id="optionId" type="number" placeholder="옵션 ID" style="width:100px"></div>
                <div><label>시작일</label><input id="startDate" type="date" value="2026-04-25"></div>
                <div><label>종료일</label><input id="endDate" type="date" value="2026-04-30"></div>
                <div><label>판매가</label><input id="sellingPrice" type="number" placeholder="판매가" style="width:120px"></div>
                <div><label>세금포함</label><select id="taxIncluded"><option value="true">포함</option><option value="false">불포함</option></select></div>
                <div><button class="btn" onclick="adjustPrice()">가격 조정</button></div>
            </div>
            <div id="result" class="result"></div>
        </div>
    </div>
    <script>
        async function adjustPrice() {
            const optId = document.getElementById('optionId').value;
            if (!optId) { alert('객실 옵션 ID를 입력하세요'); return; }
            const res = await fetch(`/api/v1/admin/room-options/${optId}/price`, {
                method: 'PATCH', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    start_date: document.getElementById('startDate').value,
                    end_date: document.getElementById('endDate').value,
                    selling_price: +document.getElementById('sellingPrice').value,
                    tax_included: document.getElementById('taxIncluded').value === 'true'
                })
            });
            const json = await res.json();
            document.getElementById('result').textContent = json.status === 'SUCCESS'
                ? `가격 조정 완료 (${json.data.length}일 반영)` : '실패: ' + (json.error?.message||'');
        }
    </script>
</body>
</html>
