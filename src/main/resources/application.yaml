spring:
  application:
    name: platform

  datasource:
    url: jdbc:mysql://localhost:3307/accommodation_platform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: create
    defer-datasource-initialization: true
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 100

  jackson:
    property-naming-strategy: SNAKE_CASE

jwt:
  secret: accommodation-platform-jwt-secret-key-for-development-only-minimum-256-bits
  expiration: 86400000

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{trace_id:-}] %-5level %logger{36} - %msg%n"
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
