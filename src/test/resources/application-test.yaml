spring:
  sql:
    init:
      mode: never

  datasource:
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    url: jdbc:tc:mysql:8.0.36:///test?TC_REUSABLE=true
    username: test
    password: test

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 100
        format_sql: true
    show-sql: true

  jackson:
    property-naming-strategy: SNAKE_CASE

jwt:
  secret: test-jwt-secret-key-for-testing-only-minimum-256-bits-required-here
  expiration: 86400000

logging:
  level:
    org.hibernate.SQL: debug
    org.testcontainers: info
